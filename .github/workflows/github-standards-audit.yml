name: GitHub label standards audit

on:
  schedule:
    - cron: '17 11 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-label-standards-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GH_STANDARDS_TOKEN }}

    steps:
      - name: Require standards token
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
              throw 'Configure the GH_STANDARDS_TOKEN repository secret before running this workflow.'
          }

      - uses: actions/checkout@v4

      - name: Audit repository labels
        shell: pwsh
        run: |
          ./scripts/New-GitHubLabelStandardsAudit.ps1 `
              -Organizations pylesoft, floorbox `
              -OutputDirectory ./artifacts/labels

      - name: Summarize drift
        shell: pwsh
        run: |
          $audit = Get-Content -Raw (Get-ChildItem ./artifacts/labels/*.json | Select-Object -First 1) | ConvertFrom-Json

          $summary = [ordered]@{
              generated_at = [datetimeoffset]::UtcNow.ToString('o')
              repositories = [int] $audit.summary.repositories
              drift = [int] $audit.summary.drift
              live_resolution_exceptions = [int] $audit.summary.live_resolution_exceptions
              read_errors = [int] $audit.summary.errors
          }

          $summary | ConvertTo-Json | Set-Content -Encoding utf8 ./artifacts/summary.json
          @"
          ## GitHub label standards audit

          | Check | Count |
          |---|---:|
          | Repositories | $($summary.repositories) |
          | Label drift | $($summary.drift) |
          | Live resolution exceptions | $($summary.live_resolution_exceptions) |
          | Read errors | $($summary.read_errors) |
          "@ | Add-Content $env:GITHUB_STEP_SUMMARY

          if ($summary.drift -gt 0 -or $summary.read_errors -gt 0) {
              throw 'GitHub label standards drift was detected. Review the uploaded audit artifact.'
          }

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-label-standards-audit-${{ github.run_id }}
          path: artifacts
          if-no-files-found: error
          retention-days: 30
