name: Feature
description: Propose a new capability or meaningful improvement.
title: ""
labels: [enhancement]
type: Feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What need should this feature address?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the expected behavior and user value.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the observable conditions for completion.
    validations:
      required: false
